name: PFSP tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test-pfsp:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Chapel
        uses: actions/cache@v4
        with:
          path: ~/chapel-2.8.0MC
          key: ${{ runner.os }}-chapel-2.8.0MC

      - name: Build Chapel (if needed)
        working-directory: chpl_config
        run: |
          source laptop_multicore.sh
          make main_pfsp.out

      - name: Run PFSP tests with LB1
        working-directory: tests
        run: ./tests_pfsp_lb1.sh

      - name: Run PFSP tests with LB1_d
        working-directory: tests
        run: ./tests_pfsp_lb1_d.sh

      - name: Run PFSP tests with LB2
        working-directory: tests
        run: ./tests_pfsp_lb2.sh
